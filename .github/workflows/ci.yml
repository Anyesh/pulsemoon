name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: pulsemon-linux-amd64
            binary: target/release/pulsemon
          - os: macos-latest
            artifact: pulsemon-macos-amd64
            binary: target/release/pulsemon
          - os: windows-latest
            artifact: pulsemon-windows-amd64.exe
            binary: target/release/pulsemon.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - run: cargo test

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}
          retention-days: 30
